/* ===== device / shell ===== */
.switcher{display:flex; gap:6px; padding:10px; z-index:5;}
.switcher button{font:inherit; font-weight:700; font-size:13px; border:2px solid var(--brown); background:transparent; color:var(--brown); border-radius:99px; padding:5px 16px;}
.switcher button.on{background:var(--brown); color:var(--cream);}
.lang{margin-left:auto; font-size:11.5px; font-weight:800; border:1.5px solid rgba(250,210,144,.6); color:var(--cream); border-radius:99px; padding:3px 10px; cursor:pointer; letter-spacing:.03em; flex:none;}
#device{width:100%; max-width:420px; background:var(--paper); flex:1; display:flex; flex-direction:column; position:relative; overflow:hidden; box-shadow:0 0 24px rgba(74,33,0,.18);}
@media(min-width:480px){ #device{border-radius:26px; margin-bottom:16px; max-height:860px;} }

.screen{display:none; flex-direction:column; flex:1; overflow:hidden;}
.screen.on{display:flex;}
.appbar{background:var(--brown); color:var(--cream); padding:12px 14px; font-weight:800; font-size:17px; display:flex; align-items:center; gap:10px; flex:none;}
.appbar .back{font-size:22px; line-height:1; padding:0 4px; cursor:pointer;}
.appbar .mini{width:30px; height:30px; flex:none;}
.appbar .aux{margin-left:auto; font-size:12px; font-weight:600; opacity:.85; cursor:pointer;}
.scroll{flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px;}
.footer{flex:none; padding:12px 14px; background:var(--paper); border-top:1.5px solid var(--line); display:flex; gap:8px;}

/* ===== components ===== */
.card{background:var(--card); border:1.5px solid var(--line); border-radius:16px; padding:12px;}
.lbl{font-size:11px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:var(--meta);}
.meta{font-size:12.5px; color:var(--meta); font-weight:600;}
.big{font-size:24px; font-weight:800;}
.huge{font-size:38px; font-weight:800; line-height:1.1;}
input,select{font:inherit; font-size:15px; width:100%; border:1.5px solid var(--line); background:#fff; border-radius:12px; padding:11px 12px; color:var(--ink);}
input:focus{outline:2px solid var(--teal);}
.fld{display:flex; flex-direction:column; gap:4px;}
.fld span{font-size:12.5px; font-weight:700;}
.fld span em{font-style:normal; color:var(--meta); font-weight:600; font-size:11.5px;}
.btn{font:inherit; font-weight:800; font-size:15px; border:none; border-radius:14px; padding:14px; text-align:center; cursor:pointer; width:100%;}
.btn.primary{background:var(--amber); color:var(--amber-ink); box-shadow:0 2px 0 #B96A0C;}
.btn.primary:active{transform:translateY(1px); box-shadow:none;}
.btn.primary:disabled{background:#E3D5BB; color:#A08A69; box-shadow:none;}
.btn.brown{background:var(--brown); color:var(--cream);}
.btn.ghost{background:transparent; border:2px dashed #D5BE97; color:var(--meta); font-weight:700;}
.btn.line{background:transparent; border:2px solid var(--brown); color:var(--brown);}
.btn.dangerline{background:transparent; border:2px solid var(--danger); color:var(--danger);}
.btn.ok{background:var(--ok); color:#fff; box-shadow:0 2px 0 #1F7A43;}
.btn.sm{padding:9px; font-size:13.5px; border-radius:11px;}
.chip{display:inline-block; font-size:10px; font-weight:800; letter-spacing:.04em; border-radius:99px; padding:2.5px 9px; vertical-align:middle;}
.chip.gray{background:#EFE5D0; color:var(--meta);}
.chip.green{background:var(--tealbg); color:var(--tealdeep);}
.chip.yellow{background:var(--warnbg); color:var(--warn);}
.chip.red{background:var(--dangerbg); color:var(--danger);}
.chip.brown{background:#F0DFC4; color:var(--brown);}
.flex{display:flex; align-items:center; gap:8px;}
.right{margin-left:auto; text-align:right;}
.grid2{display:grid; grid-template-columns:1fr 1fr; gap:9px;}
.center{text-align:center;}
.divider{border-top:1.5px dashed var(--line);}

/* nav */
.nav{flex:none; display:flex; background:var(--brown2); padding:6px 4px calc(6px + env(safe-area-inset-bottom));}
.nav div{flex:1; text-align:center; color:#C9A87B; font-size:11px; font-weight:700; padding:7px 2px; border-radius:12px; cursor:pointer;}
.nav div i{display:block; font-style:normal; font-size:19px; line-height:1.2;}
.nav div.on{color:var(--teal); background:rgba(63,208,167,.12);}

/* product tiles */
.tile{position:relative; background:var(--card); border:1.5px solid var(--line); border-radius:14px; padding:11px 9px; text-align:center; cursor:pointer;}
.tile b{display:block; font-size:14px;}
.tile small{font-size:12px; color:var(--meta); font-weight:700;}
.tile .price{font-size:15px; font-weight:800; color:var(--brown);}
.tile.dis{opacity:.45; pointer-events:none;}
.tile .qtyb{position:absolute; top:-8px; right:-6px; background:var(--amber); color:var(--amber-ink); font-size:12px; font-weight:800; border-radius:99px; padding:1px 8px; box-shadow:0 1px 0 #B96A0C;}

/* session cards */
.sess{background:var(--card); border:2px solid var(--line); border-radius:16px; padding:11px 12px; cursor:pointer;}
.sess .count{font-size:21px; font-weight:800; font-variant-numeric:tabular-nums;}
.sess.overdue{border-color:var(--danger); background:#FDF1EE;}
.sess.overdue .count{color:var(--danger);}

/* tabs */
.tabs{display:flex; background:#F1E4C8; border-radius:13px; padding:4px; gap:4px;}
.tabs div{flex:1; text-align:center; font-size:13px; font-weight:800; padding:9px 2px; border-radius:10px; color:var(--meta); cursor:pointer;}
.tabs div.on{background:#fff; color:var(--ink); box-shadow:inset 0 -3px 0 var(--teal), 0 1px 3px rgba(0,0,0,.08);}

/* sheet + toast */
#overlay{position:absolute; inset:0; background:rgba(51,32,13,.45); display:none; z-index:20;}
#overlay.on{display:block;}
.sheet{position:absolute; left:0; right:0; bottom:0; background:var(--paper); border-radius:22px 22px 0 0; padding:18px 16px calc(18px + env(safe-area-inset-bottom)); display:none; flex-direction:column; gap:10px; z-index:21; box-shadow:0 -6px 24px rgba(74,33,0,.25); max-height:86%; overflow-y:auto;}
.sheet.on{display:flex;}
.sheet h3{font-size:17px;}
#toast{position:absolute; left:50%; bottom:88px; transform:translateX(-50%); background:var(--brown); color:var(--cream); font-size:13.5px; font-weight:700; padding:10px 18px; border-radius:99px; opacity:0; transition:opacity .25s; z-index:30; pointer-events:none; white-space:nowrap; max-width:92%; text-overflow:ellipsis; overflow:hidden;}
#toast.on{opacity:1;}

/* stepper */
.stepper{display:flex; align-items:center; justify-content:center; gap:18px;}
.stepper button{font:inherit; width:46px; height:46px; border-radius:14px; border:2px solid var(--line); background:#fff; font-size:22px; font-weight:800; color:var(--tealdeep); cursor:pointer;}
.stepper .val{font-size:26px; font-weight:800; min-width:74px; text-align:center;}

/* ticket */
.ticket{background:#fff; border:2px dashed #C9AE83; border-radius:8px; padding:14px; font-family:ui-monospace,Menlo,monospace; font-size:12px; line-height:1.65; color:#222;}
.qr{width:150px; height:150px; margin:4px auto; border:8px solid #33200D; background:
  repeating-linear-gradient(0deg,#33200D 0 7px,transparent 7px 14px),
  repeating-linear-gradient(90deg,#33200D 0 7px,transparent 7px 14px);}
.photo-thumb{width:74px; height:74px; border-radius:10px; background:#D8C7A6; display:flex; align-items:center; justify-content:center; font-size:26px; border:2px solid var(--line);}
.gender{display:flex; gap:8px;}
.gender div{flex:1; border:2px solid var(--line); background:#fff; border-radius:12px; text-align:center; padding:11px 4px; font-weight:700; font-size:14px; color:var(--meta); cursor:pointer;}
.gender div.on{border-color:var(--amber); color:var(--amber-ink); background:#FDF2DF;}
.banner{border:2px solid var(--warn); background:var(--warnbg); border-radius:14px; padding:11px 12px;}
.rowlink{cursor:pointer;}
@media print{ .switcher,.nav,.footer,#overlay,.sheet,#toast{display:none!important;} body{background:#fff;} #device{box-shadow:none; max-width:none;} }
</style>
</head>
<body>

<div class="switcher">
  <button id="swParent" onclick="setMode('parent')">👨‍👩‍👧 <span data-t="sw_parent"></span></button>
  <button id="swAdmin" class="on" onclick="setMode('admin')">🐱 <span data-t="sw_admin"></span></button>
</div>

<div id="device">

<!-- ================= PARENT: SIGNUP ================= -->
<section class="screen" id="p-signup">
  <div class="appbar"><div class="logo mini"></div> <span data-t="app_name"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll">
    <div class="center"><div class="logo" style="width:88px;height:88px;margin:2px auto"></div>
      <div style="font-weight:800; font-size:18px" data-t="signup_title"></div></div>
    <div class="card" style="display:flex;flex-direction:column;gap:10px">
      <div class="lbl" data-t="sec_parent"></div>
      <div class="fld"><span data-t="f_parent_name"></span><input id="pf-name"></div>
      <div class="fld"><span data-t="f_phone"></span><input id="pf-phone" inputmode="tel" placeholder="08x-xxx-xxxx"></div>
      <div class="fld"><span data-t="f_email"></span><input id="pf-email" inputmode="email" placeholder="name@email.com"></div>
    </div>
    <div id="pf-children"></div>
    <button class="btn ghost" onclick="addChildBlock()" data-t="add_child"></button>
    <label class="flex" style="align-items:flex-start; gap:10px; font-size:13px; font-weight:600; cursor:pointer">
      <input type="checkbox" id="pf-consent" style="width:22px;height:22px;margin-top:2px">
      <span data-t-html="consent_html"></span>
    </label>
  </div>
  <div class="footer"><button class="btn primary" onclick="parentRegister()" data-t="register"></button></div>
</section>

<!-- ================= PARENT: SUCCESS ================= -->
<section class="screen" id="p-success">
  <div class="appbar"><div class="logo mini"></div> <span data-t="app_name"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll" style="justify-content:center; text-align:center">
    <div style="width:66px;height:66px;border-radius:50%;background:var(--ok);color:#fff;font-size:34px;display:flex;align-items:center;justify-content:center;margin:0 auto">✓</div>
    <div class="big" data-t="success_title"></div>
    <div style="height:6px"></div>
    <div style="font-weight:700" data-t="show_staff"></div>
    <div class="card" style="text-align:left; margin-top:8px">
      <div class="lbl" data-t="registered"></div>
      <div id="ps-names" style="font-weight:800; font-size:16px; margin-top:4px"></div>
    </div>
  </div>
</section>

<!-- ================= ADMIN: LOGIN ================= -->
<section class="screen" id="a-login">
  <div class="scroll" style="justify-content:center">
    <div class="center"><div class="logo" style="width:120px;height:120px;margin:0 auto 6px"></div>
      <div style="font-weight:800;font-size:20px;color:var(--brown)">SCCC Admin</div>
      <div class="meta" data-t="staff_signin"></div></div>
    <div class="fld"><span data-t="email"></span><input value="staff@sccc.co"></div>
    <div class="fld"><span data-t="password"></span><input type="password" value="••••••••"></div>
    <button class="btn primary" onclick="show('a-sessions')" data-t="log_in"></button>
    <div class="meta center" data-t="proto_hint"></div>
    <div class="center" style="margin-top:6px"><span class="lang" onclick="toggleLang()" style="border-color:var(--brown);color:var(--brown)"></span></div>
  </div>
</section>

<!-- ================= ADMIN: SESSIONS ================= -->
<section class="screen" id="a-sessions">
  <div class="appbar"><div class="logo mini"></div> <span data-t="nav_sessions"></span> <span class="aux" id="clock"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll" id="sess-list"></div>
  <div class="nav" data-tab="sessions"></div>
</section>

<!-- ================= ADMIN: SEARCH ================= -->
<section class="screen" id="a-search">
  <div class="appbar"><div class="logo mini"></div> <span data-t="nav_search"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll">
    <input id="q" data-tp="search_ph" oninput="renderSearch()">
    <div id="search-results" style="display:flex;flex-direction:column;gap:9px"></div>
  </div>
  <div class="footer"><button class="btn primary" onclick="openSheet('sh-quickadd')" data-t="quick_add"></button></div>
  <div class="nav" data-tab="search"></div>
</section>

<!-- ================= ADMIN: CHILD PAGE ================= -->
<section class="screen" id="a-child">
  <div class="appbar"><span class="back" onclick="goBack()">‹</span> <span id="ch-title"></span> <span class="aux" data-t="edit"></span></div>
  <div class="scroll" id="ch-body"></div>
  <div class="footer"><button class="btn primary" onclick="startSellFor(currentChildId)" data-t="sell_btn"></button></div>
</section>

<!-- ================= ADMIN: SELL ================= -->
<section class="screen" id="a-sell">
  <div class="appbar"><div class="logo mini"></div> <span data-t="nav_sell"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll">
    <div class="card flex" id="sell-childbar"></div>
    <div class="lbl" data-t="g_entry"></div>
    <div class="grid2" id="grid-entry"></div>
    <div class="lbl" data-t="g_addon"></div>
    <div class="grid2" id="grid-addon"></div>
    <div class="lbl" data-t="g_bundle"></div>
    <div class="grid2" id="grid-bundle"></div>
    <div class="lbl" data-t="g_pass"></div>
    <div class="grid2" id="grid-pass"></div>
  </div>
  <div class="footer"><button class="btn primary" id="sell-total" onclick="goCheckout()">Checkout ▶</button></div>
  <div class="nav" data-tab="sell"></div>
</section>

<!-- ================= ADMIN: CHECKOUT ================= -->
<section class="screen" id="a-checkout">
  <div class="appbar"><span class="back" onclick="goBack()">‹</span> <span data-t="checkout_title"></span></div>
  <div class="scroll">
    <div class="meta center" id="co-summary"></div>
    <div class="huge center" id="co-total"></div>
    <div class="tabs" id="co-tabs">
      <div class="on" onclick="setMethod('promptpay',this)">PromptPay</div>
      <div onclick="setMethod('bank',this)" data-t="m_bank"></div>
      <div onclick="setMethod('cash',this)" data-t="m_cash"></div>
    </div>
    <div id="co-pane"></div>
    <div class="card flex" id="co-proof">
      <div class="photo-thumb" id="co-thumb" style="display:none">🧾</div>
      <div style="flex:1">
        <b id="co-proof-label" style="font-size:14px"></b>
        <div class="meta" id="co-proof-hint"></div>
      </div>
      <button class="btn line sm" style="width:auto" onclick="takePhoto()" data-t="photo_btn"></button>
    </div>
  </div>
  <div class="footer"><button class="btn primary" id="co-confirm" disabled onclick="openSheet('sh-confirm')" data-t="confirm_pay"></button></div>
</section>

<!-- ================= ADMIN: RECEIPT ================= -->
<section class="screen" id="a-receipt">
  <div class="appbar"><span class="back" onclick="show('a-sessions')">‹</span> <span data-t="receipt_title"></span></div>
  <div class="scroll">
    <div class="ticket" id="rc-ticket"></div>
    <div class="flex">
      <button class="btn line sm" onclick="window.print()" data-t="print"></button>
      <button class="btn line sm" onclick="toast(t('proto_png'))" data-t="save_img"></button>
    </div>
    <button class="btn ok" id="rc-start" onclick="startFromReceipt()" data-t="start_now"></button>
  </div>
</section>

<!-- ================= ADMIN: START CONFIG ================= -->
<section class="screen" id="a-start">
  <div class="appbar"><span class="back" onclick="goBack()">‹</span> <span data-t="start_title"></span></div>
  <div class="scroll" id="st-body"></div>
  <div class="footer"><button class="btn primary" onclick="confirmStart()" data-t="start_session"></button></div>
</section>

<!-- ================= ADMIN: PICKUP SLIP ================= -->
<section class="screen" id="a-slip">
  <div class="appbar"><div class="logo mini"></div> <span data-t="slip_title"></span></div>
  <div class="scroll center" id="slip-body"></div>
  <div class="footer" style="flex-direction:column">
    <div class="flex" style="width:100%">
      <button class="btn line sm" onclick="window.print()" data-t="print_slip"></button>
      <button class="btn line sm" onclick="toast(t('proto_png'))" data-t="save_img"></button>
    </div>
    <button class="btn primary" onclick="show('a-sessions')" data-t="done"></button>
  </div>
</section>

<!-- ================= ADMIN: SESSION DETAIL ================= -->
<section class="screen" id="a-sessdetail">
  <div class="appbar"><span class="back" onclick="show('a-sessions')">‹</span> <span id="sd-title"></span></div>
  <div class="scroll" id="sd-body"></div>
  <div class="footer" style="flex-direction:column">
    <button class="btn line" id="sd-extend" data-t="add_hour"></button>
    <button class="btn dangerline" onclick="askEnd()" data-t="end_session"></button>
  </div>
</section>

<!-- ================= ADMIN: TODAY ================= -->
<section class="screen" id="a-today">
  <div class="appbar"><div class="logo mini"></div> <span data-t="nav_overview"></span><span class="lang" onclick="toggleLang()"></span></div>
  <div class="scroll">
    <div class="tabs" id="ov-units">
      <div class="on" onclick="setOvUnit('day',this)"></div>
      <div onclick="setOvUnit('week',this)"></div>
      <div onclick="setOvUnit('month',this)"></div>
    </div>
    <div class="flex" style="justify-content:center; gap:14px">
      <button class="btn line sm" style="width:44px" onclick="ovNav(-1)">◀</button>
      <b id="ov-label" style="font-size:15px; min-width:150px; text-align:center"></b>
      <button class="btn line sm" style="width:44px" id="ov-next" onclick="ovNav(1)">▶</button>
    </div>
    <div id="today-body" style="display:flex;flex-direction:column;gap:10px"></div>
  </div>
  <div class="footer">
    <button class="btn line sm" onclick="window.print()" data-t="print_summary"></button>
    <button class="btn line sm" onclick="toast(t('proto_png'))" data-t="save_img"></button>
  </div>
  <div class="nav" data-tab="today"></div>
</section>

<!-- ================= SHEETS ================= -->
<div id="overlay" onclick="closeSheets()"></div>

<div class="sheet" id="sh-quickadd">
  <h3 data-t="qa_title"></h3>
  <div class="meta" data-t="qa_sub"></div>
  <div class="fld"><span data-t="f_child_name"></span><input id="qa-name"></div>
  <div class="fld"><span data-t="f_phone"></span><input id="qa-phone" inputmode="tel" placeholder="08x-xxx-xxxx"></div>
  <button class="btn primary" onclick="quickAdd()" data-t="qa_create"></button>
</div>

<div class="sheet" id="sh-parent">
  <h3 data-t="pd_title"></h3>
  <div class="meta" id="shp-sub"></div>
  <div class="fld"><span data-t="f_parent_name"></span><input id="pd-name"></div>
  <div class="fld"><span data-t="f_email"></span><input id="pd-email"></div>
  <div class="fld"><span data-t="f_dob"></span><input id="pd-dob" type="date"></div>
  <div class="fld"><span data-t="f_gender"></span><div class="gender" id="pd-gender"><div onclick="pickGender(this,'male')" data-t="male"></div><div onclick="pickGender(this,'female')" data-t="female"></div></div></div>
  <button class="btn ghost sm" onclick="toast(t('proto_link'))" data-t="pd_link"></button>
  <button class="btn primary" onclick="saveParentDetails()" data-t="pd_save"></button>
</div>

<div class="sheet" id="sh-confirm">
  <h3 id="shc-title" data-t="cf_title"></h3>
  <div class="meta" id="shc-sub"></div>
  <button class="btn ok" onclick="finalizePayment()" data-t="cf_yes"></button>
  <button class="btn ghost sm" onclick="closeSheets()" data-t="cancel"></button>
</div>

<div class="sheet" id="sh-end">
  <h3 id="she-title">End session</h3>
  <div class="meta" id="she-sub"></div>
  <div id="she-refund" style="display:none; flex-direction:column; gap:8px">
    <div class="stepper"><button onclick="bumpRefund(-1)">−</button><div class="val"><span id="she-val">0</span> hr</div><button onclick="bumpRefund(1)">＋</button></div>
    <div class="meta center" id="she-hint"></div>
  </div>
  <button class="btn primary" id="she-btn" onclick="confirmEnd()"></button>
  <button class="btn ghost sm" onclick="closeSheets()" data-t="cancel"></button>
</div>

<div class="sheet" id="sh-redeem">
  <h3 data-t="rd_title"></h3>
  <div class="meta" id="shr-warn"></div>
  <div id="shr-opts" style="display:flex; flex-direction:column; gap:8px"></div>
</div>

<div class="sheet" id="sh-startconfirm">
  <h3 data-t="sc_title"></h3>
  <div class="meta" id="shs-sub"></div>
  <button class="btn primary" onclick="doStart()" data-t="sc_now"></button>
  <button class="btn ghost sm" onclick="closeSheets()" data-t="cancel"></button>
</div>

<div id="toast"></div>
</div>

function sessCard(s){
  const c=childById(s.childId), pr=P(instances.find(i=>i.id===s.instanceId).sku);
  const over=now()>s.plannedEnd;
  const diff=Math.abs(now()-s.plannedEnd), hh=Math.floor(diff/3600000), mm=Math.floor(diff%3600000/60000), ss=Math.floor(diff%60000/1000);
  const cd=(over?'+':'')+hh+':'+String(mm).padStart(2,'0')+':'+String(ss).padStart(2,'0');
  return `<div class="sess ${over?'overdue':''}" onclick="openSession(${s.id})">

function bumpRefund(d){ refundVal=Math.max(0,Math.min(refundMax,refundVal+d)); updateRefund(); }
function confirmEnd(){
  const s=sdSession, inst=instances.find(i=>i.id===s.instanceId), pr=P(inst.sku);
  s.status='completed';
  if(pr.type==='pass'){ inst.hoursRemaining+=refundVal; inst.status=inst.hoursRemaining>0?'active':'consumed';
    if(refundVal)toast(t('t_refunded')(refundVal,inst.hoursRemaining)); else toast(t('t_ended'));
  }else{ inst.status='consumed'; toast(t('t_ended')); }
  closeSheets(); show('a-sessions');
}

/* ============ redeem ============ */
function openRedeem(instId){
  const inst=instances.find(i=>i.id===instId), c=childById(currentChildId);
  $('shr-warn').innerHTML=runningSession(c.id)?t('for_w')+' '+esc(c.name):t('rd_warn');
  let opts='';
  if((inst.extra||0)>0)opts+=`<button class="btn line" onclick="useCredit(${inst.id},'extra',false)">${t('rd_extra')} · ${t('left')} ${inst.extra}</button>`;
  if(inst.crayon>0)opts+=`<button class="btn line" onclick="useCredit(${inst.id},'crayon',false)">${t('rd_crayon')} · ${t('left')} ${inst.crayon}</button>`;
  if(inst.clay>0)opts+=`<button class="btn line" onclick="useCredit(${inst.id},'clay',false)">${t('rd_clay')} · ${t('left')} ${inst.clay}</button>`;
  $('shr-opts').innerHTML=opts;
  openSheet('sh-redeem');
}
function useCredit(instId,type,fromSession){
  const inst=instances.find(i=>i.id===instId);
  const cid=fromSession?sdSession.childId:currentChildId;
  if(type==='extra'){
    const s=runningSession(cid);
    if(!s){toast(t('t_needs_run'));return;}
    s.plannedEnd=new Date(s.plannedEnd.getTime()+3600000);
    inst.extra--;
    redemptions.push({type:'extra',time:now()});
    toast(t('t_timer_ext')(T(s.plannedEnd)));
  }else{
    inst[type]--;
    redemptions.push({type,time:now()});
    toast(t('t_credit')(t(type==='crayon'?'crayon_w':'clay_w'),inst[type]));
  }
  const pr=P(inst.sku);
  if(['addon','extra'].includes(pr.type)&&(inst.crayon||0)+(inst.clay||0)+(inst.extra||0)===0)inst.status='consumed';
  closeSheets();
  if(fromSession)renderSessDetail(); else renderChild();
}

/* ============ overview ============ */
let ovUnit='day', ovOffset=0;
function setOvUnit(u,el){ ovUnit=u; ovOffset=0; renderOverview(); }
function ovNav(d){ ovOffset=Math.min(0,ovOffset+d); renderOverview(); }
function startOfDay(d){const x=new Date(d);x.setHours(0,0,0,0);return x;}
function ovRange(){
  const n=now();
  if(ovUnit==='day'){const a=startOfDay(n);a.setDate(a.getDate()+ovOffset);const b=new Date(a);b.setDate(b.getDate()+1);return[a,b];}
  if(ovUnit==='week'){const a=startOfDay(n);const dow=(a.getDay()+6)%7;a.setDate(a.getDate()-dow+7*ovOffset);const b=new Date(a);b.setDate(b.getDate()+7);return[a,b];}
  const a=new Date(n.getFullYear(),n.getMonth()+ovOffset,1);const b=new Date(n.getFullYear(),n.getMonth()+ovOffset+1,1);return[a,b];
}
function ovLabel(a,b){
  const loc=lang==='th'?'th-TH':'en-GB';
  if(ovUnit==='day'){
    if(ovOffset===0)return t('today_w')+' · '+a.toLocaleDateString(loc,{day:'numeric',month:'short'});
    if(ovOffset===-1)return t('yesterday')+' · '+a.toLocaleDateString(loc,{day:'numeric',month:'short'});
    return a.toLocaleDateString(loc,{weekday:'short',day:'numeric',month:'short'});
  }
  if(ovUnit==='week'){
    const e=new Date(b);e.setDate(e.getDate()-1);
    const lbl=a.toLocaleDateString(loc,{day:'numeric',month:'short'})+' – '+e.toLocaleDateString(loc,{day:'numeric',month:'short'});
    return (ovOffset===0?t('this_week')+' · ':'')+lbl;
  }
  return (ovOffset===0?t('this_month')+' · ':'')+a.toLocaleDateString(loc,{month:'long',year:'numeric'});
}
function renderOverview(){
  const tabs=$('ov-units').children;
  const units=['day','week','month'];
  [...tabs].forEach((el,i)=>{el.classList.toggle('on',units[i]===ovUnit);el.textContent=t('u_'+units[i]);});
  const [a,b]=ovRange();
  $('ov-label').textContent=ovLabel(a,b);
  $('ov-next').disabled=ovOffset>=0; $('ov-next').style.opacity=ovOffset>=0?.35:1;
  const inRange=o=>o.time>=a&&o.time<b;
  const list=orders.filter(inRange).sort((x,y)=>y.time-x.time);
  const tot={cash:0,promptpay:0,bank:0};
  list.forEach(o=>tot[o.method]+=o.total);
  const grand=tot.cash+tot.promptpay+tot.bank;
  const started=sessions.filter(x=>x.start>=a&&x.start<b).length;
  const redeemed=redemptions.filter(r=>r.time>=a&&r.time<b).length;
  const loc=lang==='th'?'th-TH':'en-GB';
  const rowTime=o=>ovUnit==='day'?T(o.time):o.time.toLocaleDateString(loc,{day:'numeric',month:'short'})+' '+T(o.time);
  $('today-body').innerHTML=`
   <div class="grid2" style="grid-template-columns:repeat(4,1fr);gap:7px">
     <div class="tile"><small>${t('cash')}</small><b>${fmt(tot.cash)}</b></div>
     <div class="tile"><small>PromptPay</small><b>${fmt(tot.promptpay)}</b></div>
     <div class="tile"><small>${t('bank_w')}</small><b>${fmt(tot.bank)}</b></div>
     <div class="tile" style="border-color:var(--brown)"><small>${t('total_s')}</small><b style="color:var(--brown)">${fmt(grand)}</b></div></div>
   <div class="meta center">${list.length} ${t('orders_w')} · ${started} ${t('sess_started')} · ${redeemed} ${t('credits_used')}</div>
   ${list.length?list.map(o=>{const c=childById(o.childId);const ico={cash:'💵',promptpay:'📱',bank:'🏦'}[o.method];
     return `<div class="card rowlink meta" onclick="showReceipt(${o.id},true)">${rowTime(o)} · <b style="color:var(--ink)">${esc(c.name)}</b> · ${o.items.map(it=>it.qty+'× '+P(it.sku).short).join(', ')} · ${ico} <b style="color:var(--ink)">${fmt(o.total)}</b> ›</div>`;}).join('')
   :'<div class="card meta center" style="padding:22px">'+t('no_orders')+'</div>'}`;
}

/* ============ boot ============ */
addChildBlock();
applyLang();
show('a-login',false);
</script>
